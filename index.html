<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Thumbnail Maker</title>
</head>
<body>
  <div>
    <h2>Thumbnail Maker</h2>
    <section class="section-container">
      <canvas id="canvas"></canvas>
      <input type="file" id="fileInput" name="image">
      <input type="text" id="textInput" placeholder="텍스트를 입력해주세요.">
      <div>
        <button type="button">폰트 종류1</button>
        <button type="button">폰트 종류2</button>
        <button type="button">폰트 종류3</button>
      </div>
      <div>
        <button type="button">흰색</button>
        <button type="button">검정색</button>
      </div>
      <input type="range" min="0" max="100" value="50">
      <input type="text" placeholder="텍스트를 입력해주세요.">

      <button type="button">썸네일 만들기</button>
    </section>
  </div>
</body>
<script src="script.js"></script>
</html>
