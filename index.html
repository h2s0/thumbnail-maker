<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>블로그 썸네일 만들기 | 무료 썸네일 메이커</title>
  <meta name="description" content="사진에 텍스트를 올려 블로그 썸네일을 무료로 만들어보세요. 다양한 폰트와 색상을 지원합니다.">

  <!-- OG (카카오, 페이스북) -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://thumbnail.heeso.site/">
  <meta property="og:title" content="블로그 썸네일 만들기">
  <meta property="og:description" content="사진에 텍스트를 올려 블로그 썸네일을 무료로 만들어보세요.">
  <meta property="og:image" content="https://thumbnail.heeso.site/og.png">

  <!-- 트위터 카드 -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="블로그 썸네일 만들기">
  <meta name="twitter:description" content="사진에 텍스트를 올려 블로그 썸네일을 무료로 만들어보세요.">
  <meta name="twitter:image" content="https://thumbnail.heeso.site/og.png">

  <link rel="canonical" href="https://thumbnail.heeso.site/">
  <link rel="stylesheet" href="style.css">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6143261166799767"
     crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <h1 class="title">블로그 썸네일을 만들어보아요</h1>
    <section class="section-container">

      <div class="canvas-wrapper">
        <canvas id="canvas"></canvas>
        <div id="imagePlaceholder" class="image-placeholder">
          <span>+</span>
          <p>이미지를 탭해서 추가하세요</p>
        </div>
        <div class="canvas-hover-overlay">이미지 변경</div>
        <div class="canvas-change-badge">📷</div>
      </div>
      <input type="file" id="fileInput" name="image" accept="image/*" style="display:none">

      <div class="divider"></div>

      <textarea id="textInput" placeholder="텍스트를 입력해주세요." class="text-input"></textarea>

      <p class="section-label">폰트</p>
      <div class="button-container font-container">
        <button type="button" data-font="GmarketSans">지마켓Sans</button>
        <button type="button" data-font="KkuBulLim">꾸불림</button>
        <button type="button" data-font="OngleipKonkon">오늘원콘콘</button>
        <button type="button" data-font="IsYun">이서윤</button>
      </div>

      <p class="section-label">글씨 색상</p>
      <div class="button-container color-container">
        <button data-color="white" type="button">흰색</button>
        <button data-color="black" type="button">검정색</button>
      </div>

      <p class="section-label">옵션</p>
      <div class="button-container">
        <button id="borderToggle" type="button" class="plain-button">테두리 OFF</button>
      </div>

      <div class="overlay-container">
        <label class="overlay-label" for="overlayRange">어둡기</label>
        <input id="overlayRange" type="range" min="0" max="100" value="0">
        <span id="overlayValue">0</span>
      </div>

      <div class="divider"></div>

      <button id="downloadBtn" type="button">썸네일 만들기</button>

    </section>
  </div>
  <script src="script.js"></script>
</body>
</html>
